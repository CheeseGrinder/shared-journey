# CI: build the mod (spotlessCheck included via `check`) and expose the
# jars as workflow artifacts on every push/PR to main.
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --console=plain

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: sharedjourney
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Upload jmshim jar
        uses: actions/upload-artifact@v4
        with:
          name: sharedjourney-jmshim
          path: jmshim/build/libs/*.jar
          if-no-files-found: error
